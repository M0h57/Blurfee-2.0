name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build EXE
        shell: pwsh
        run: ./build_windows.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Blurfer.exe

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd android
          gradle :app:assembleDebug
          cd ..
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/Blurfer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/Blurfer.apk

  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-tk libfuse2

      - name: Install appimagetool
        run: |
          sudo curl -L \
            -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build Linux executable and AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh
          cp dist/Blurfer dist/Blurfer-linux-x86_64.bin

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/Blurfer-linux-x86_64.bin
            dist/Blurfer-x86_64.AppImage

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - android
      - linux
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows-exe/Blurfer.exe
            release-assets/android-apk/Blurfer.apk
            release-assets/linux-builds/Blurfer-linux-x86_64.bin
            release-assets/linux-builds/Blurfer-x86_64.AppImage

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for notes in .github/release-notes/v*.md; do
            tag="$(basename "$notes" .md)"
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file "$notes"
            else
              echo "Skipping $tag because that release does not exist yet."
            fi
          done
